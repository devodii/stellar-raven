interface:
  display_name: "Golden Truth Verification"
  short_description: "Change the golden corpus without codifying lies"
  default_prompt: "Use $golden-truth before changing any golden Q->A content: classify the truth domain, triangulate across independent source classes, encode disputed/unverifiable facts honestly, and land the change as a provenance-bearing override."
dependencies:
  tools:
    - type: "mcp"
      value: "perplexity"
      description: "General-web research class for multi-source triangulation."
    - type: "mcp"
      value: "parallel-search"
      description: "Web search/fetch class for corroboration sweeps."
    - type: "mcp"
      value: "github"
      description: "Source-code class — the implementation is ground truth for limits and behavior."
    - type: "mcp"
      value: "stellar-docs"
      description: "Docs search index class — checks both the fact and its discoverability."
    - type: "mcp"
      value: "solo"
      description: "Record corroboration matrices and close the change with commit refs."
policy:
  allow_implicit_invocation: true
