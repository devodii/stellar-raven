interface:
  display_name: "Live Service Drift Resolution"
  short_description: "Absorb an upstream catalog drift safely"
  default_prompt: "Use $live-drift-resolution to resolve a 'Live service drift detected' issue: regenerate the catalog, classify the drift, decide policy/routing-baseline vs clean bump, dual-verify, then commit and close."
dependencies:
  tools:
    - type: "mcp"
      value: "solo"
      description: "Solo MCP to spawn the independent adversarial reviewer (reviewer != author) and record the policy/baseline decision."
policy:
  allow_implicit_invocation: true
