interface:
  display_name: "Eval Round Runner"
  short_description: "Run an eval round, file upstream findings"
  default_prompt: "Use $run-evals to run an eval round on stellar-raven-codemode: pick instruments, let the runner spawn the answering and judge agents, review every verdict, triage failures to root cause, and file evidence-backed upstream findings in improvements/."
dependencies:
  tools:
    - type: "mcp"
      value: "solo"
      description: "Solo MCP to record round results, scratchpads, and todos, and to coordinate spawned agents."
    - type: "mcp"
      value: "stellar-raven"
      description: "The server under test — search/execute for live probes when triaging a failed case to root cause."
policy:
  allow_implicit_invocation: true
